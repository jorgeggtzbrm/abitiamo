/* ============================================================
   HANDLERS
   ============================================================ */
function attachHandlers() {
  const appEl = document.getElementById('app');

  // Helper compartido para todos los clicks (sea en #app o en #modal-root)
  const handleClick = async (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (btn.dataset.stop === '1') e.stopPropagation();
    await handleAction(action, btn, e);
  };

  appEl.onchange = async (e) => {
    // Selector de ajuste de día
    const select = e.target.closest('select[data-action="adjust-day"]');
    if (select) {
      const empId = select.dataset.emp;
      const date = select.dataset.date;
      const weekStart = select.dataset.week;
      const value = select.value;
      try {
        if (value === 'auto') {
          await deleteDoc(doc(db, 'payroll_adjustments', weekStart, 'items', `${empId}_${date}`));
          toast('Ajuste removido', 'info', 1500);
        } else {
          await API.setDayAdjustment(weekStart, empId, date, { status: value });
          toast('Día ajustado', 'success', 1500);
        }
        render();
      } catch (err) { toast('Error: ' + err.message, 'error'); }
      return;
    }
    // Selector de asignación de proyecto
    const projSelect = e.target.closest('select[data-action="assign-project"]');
    if (projSelect) {
      const empId = projSelect.dataset.emp;
      const date = projSelect.dataset.date;
      const slot = projSelect.dataset.slot;
      const projectId = projSelect.value;
      try {
        await API.setProjectAssignment(date, empId, slot, projectId);
        toast('Proyecto asignado', 'success', 1200);
      } catch (err) { toast('Error: ' + err.message, 'error'); }
      return;
    }
  };

  appEl.onclick = handleClick;
  // CRÍTICO: el modal vive en #modal-root (fuera de #app), por eso necesita su propio handler
  document.getElementById('modal-root').onclick = handleClick;
}

async function handleAction(action, btn, e) {

    if (action === 'open-admin') {
      go(State.adminUser ? 'admin' : 'admin-login');
    }
    else if (action === 'logout') {
      await signOut(auth);
      go('employee');
    }
    else if (action === 'back-employee') {
      go('employee');
    }
    else if (action === 'admin-login') {
      const email = document.getElementById('login-email').value.trim();
      const pwd = document.getElementById('login-pwd').value;
      btn.disabled = true; btn.textContent = 'Verificando…';
      try {
        await signInWithEmailAndPassword(auth, email, pwd);
        // El listener onAuthStateChanged se encarga del redirect
      } catch (e) {
        toast('Correo o contraseña incorrectos', 'error');
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }
    else if (action === 'tab') {
      State.adminTab = btn.dataset.tab;
      if (btn.dataset.tab !== 'today' && State.unsubTodayEvents) {
        State.unsubTodayEvents(); State.unsubTodayEvents = null;
      }
      render();
    }
    else if (action === 'add-emp') {
      State.capturedDescriptors = [];
      State.capturedPhoto = null;
      State.adminTab = 'employees-add';
      render();
    }
    else if (action === 'cancel-add-emp') {
      stopCamera();
      State.capturedDescriptors = [];
      State.capturedPhoto = null;
      State.adminTab = 'employees';
      render();
    }
    else if (action === 'capture-shot') {
      await captureShot();
    }
    else if (action === 'save-employee') {
      await saveEmployee();
    }
    else if (action === 'delete-emp') {
      const id = btn.dataset.id;
      const emp = State.employees.find(e => e.id === id);
      if (confirm(`¿Eliminar a ${emp.name}? Sus registros históricos no se borrarán.`)) {
        try {
          await API.deleteEmployee(id);
          toast('Empleado eliminado', 'info');
        } catch (e) { toast('Error: ' + e.message, 'error'); }
      }
    }
    else if (action === 'edit-emp') {
      State.editingEmpId = btn.dataset.id;
      State.adminTab = 'employees-edit';
      render();
    }
    else if (action === 'back-employees') {
      State.adminTab = 'employees';
      State.editingEmpId = null;
      render();
    }
    else if (action === 'save-emp-edit') {
      const id = State.editingEmpId;
      const startDateInput = document.getElementById('edit-startdate');
      const updates = {
        weeklySalary: parseFloat(document.getElementById('edit-salary').value) || 0,
        hourlyOvertimeRate: parseFloat(document.getElementById('edit-hourly').value) || 0,
        extraDayRate: parseFloat(document.getElementById('edit-extraday').value) || 0,
        startDate: startDateInput?.value || null
      };
      try {
        await API.updateEmployee(id, updates);
        // Refrescar lista local de empleados
        State.employees = await API.getEmployees();
        toast('Cambios guardados', 'success');
        State.adminTab = 'employees';
        State.editingEmpId = null;
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    // ----- NÓMINA -----
    else if (action === 'payroll-prev-week') {
      const d = new Date(State.payrollWeekStart + 'T00:00:00');
      d.setDate(d.getDate() - 7);
      State.payrollWeekStart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      render();
    }
    else if (action === 'payroll-next-week') {
      const d = new Date(State.payrollWeekStart + 'T00:00:00');
      d.setDate(d.getDate() + 7);
      State.payrollWeekStart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      render();
    }
    else if (action === 'payroll-this-week') {
      State.payrollWeekStart = getWeekStart(todayStr());
      render();
    }
    else if (action === 'toggle-payroll-emp') {
      const id = btn.dataset.id;
      State.expandedPayrollEmp = State.expandedPayrollEmp === id ? null : id;
      render();
    }
    else if (action === 'add-payroll-entry') {
      showAddPayrollEntryModal(btn.dataset.emp, btn.dataset.week);
    }
    else if (action === 'save-payroll-entry') {
      await savePayrollEntry(btn.dataset.emp, btn.dataset.week);
    }
    else if (action === 'del-payroll-entry') {
      if (confirm('¿Eliminar este registro?')) {
        try {
          await API.deletePayrollEntry(btn.dataset.week, btn.dataset.id);
          toast('Eliminado', 'info');
          render();
        } catch(e) { toast('Error: ' + e.message, 'error'); }
      }
    }
    else if (action === 'close-modal') {
      closeModal();
    }
    else if (action === 'export-payroll-csv') {
      await exportPayrollCsv();
    }
    else if (action === 'print-payroll') {
      printPayroll();
    }
    else if (action === 'print-all-receipts') {
      printAllReceipts();
    }
    else if (action === 'save-payroll-config') {
      const newPayroll = {
        ...State.config.payroll,
        halfDayCutoff: document.getElementById('payroll-halfday').value || '14:30',
        earlyLeaveCutoff: document.getElementById('payroll-earlyleave').value || '14:30',
        retardoFreebies: parseInt(document.getElementById('payroll-freebies').value) || 0,
        retardoExtraCharge: parseFloat(document.getElementById('payroll-charge').value) || 0
      };
      try {
        await API.setConfig({ ...State.config, payroll: newPayroll });
        State.config = { ...State.config, payroll: newPayroll };
        toast('Configuración de nómina guardada', 'success');
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'register') {
      btn.disabled = true; btn.textContent = 'Guardando…';
      await registerEvent(btn.dataset.emp, btn.dataset.evt);
    }
    else if (action === 'capture-location') {
      btn.disabled = true; btn.textContent = 'Obteniendo ubicación…';
      try {
        const pos = await getCurrentPosition();
        const radius = parseInt(document.getElementById('settings-radius').value) || 100;
        const newConfig = { ...State.config, workLocation: { lat: pos.lat, lng: pos.lng, radius } };
        await API.setConfig(newConfig);
        State.config = newConfig;
        toast(`Ubicación guardada (precisión: ${Math.round(pos.accuracy)}m)`, 'success');
        render();
      } catch (e) {
        toast('No se pudo obtener la ubicación: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = 'Usar mi ubicación actual como zona de trabajo';
      }
    }
    else if (action === 'save-schedule') {
      const newSched = { ...State.config.schedule };
      EVENT_ORDER.forEach(t => {
        const v = document.getElementById('sched-' + t).value;
        if (v) newSched[t] = { ...newSched[t], target: v };
      });
      try {
        await API.setConfig({ ...State.config, schedule: newSched });
        State.config = { ...State.config, schedule: newSched };
        toast('Horarios guardados', 'success');
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'apply-filters') {
      State.reportFrom = document.getElementById('filter-from').value;
      State.reportTo = document.getElementById('filter-to').value;
      State.reportEmployee = document.getElementById('filter-emp').value;
      State.reportData = null;
      render();
    }
    else if (action === 'export-csv') {
      await exportCsv();
    }
    // ----- PROYECTOS -----
    else if (action === 'add-project') {
      const name = prompt('Nombre del proyecto:');
      if (!name || !name.trim()) return;
      try {
        await API.addProject(name.trim());
        State.projects = await API.getProjects();
        toast('Proyecto creado', 'success');
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'rename-project') {
      const id = btn.dataset.id;
      const proj = State.projects.find(p => p.id === id);
      const name = prompt('Nuevo nombre:', proj?.name || '');
      if (!name || !name.trim()) return;
      try {
        await API.updateProject(id, { name: name.trim() });
        State.projects = await API.getProjects();
        toast('Proyecto actualizado', 'success');
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'delete-project') {
      const id = btn.dataset.id;
      const proj = State.projects.find(p => p.id === id);
      if (!confirm(`¿Eliminar el proyecto "${proj?.name}"? Las asignaciones históricas se mantienen pero no podrás verlas con su nombre.`)) return;
      try {
        await API.deleteProject(id);
        State.projects = await API.getProjects();
        toast('Proyecto eliminado', 'info');
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'goto-project-report') {
      State.adminTab = 'project-report';
      render();
    }
    else if (action === 'back-projects') {
      State.adminTab = 'projects';
      render();
    }
    else if (action === 'apply-proj-filters') {
      State.projectReportFrom = document.getElementById('proj-from').value;
      State.projectReportTo = document.getElementById('proj-to').value;
      render();
    }
    else if (action === 'export-proj-csv') {
      await exportProjectCsv();
    }
    // ----- PRÉSTAMOS -----
    else if (action === 'add-loan') {
      showLoanModal();
    }
    else if (action === 'save-loan') {
      await saveLoan();
    }
    else if (action === 'loan-payment') {
      const id = btn.dataset.id;
      const loan = State.loans.find(l => l.id === id);
      const remaining = loan.totalAmount - (loan.paidAmount || 0);
      const amt = prompt(`Monto del pago manual:\n\nMonto pendiente: ${fmtMoney(remaining)}\nAbono semanal habitual: ${fmtMoney(loan.weeklyPayment)}`);
      if (!amt || isNaN(parseFloat(amt))) return;
      const amount = parseFloat(amt);
      if (amount <= 0) { toast('Monto inválido', 'error'); return; }
      const note = prompt('Nota (opcional):', 'Pago manual') || '';
      try {
        const newPaid = (loan.paidAmount || 0) + amount;
        const isFullyPaid = newPaid >= loan.totalAmount;
        await API.updateLoan(id, {
          paidAmount: newPaid,
          status: isFullyPaid ? 'paid' : 'active'
        });
        await API.addLoanPayment(id, { amount, type: 'manual', note });
        toast('Pago registrado', 'success');
        State.loans = await API.getLoans();
        State.expandedLoanId = id;
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'mark-loan-paid') {
      if (!confirm('¿Marcar este préstamo como pagado por completo?')) return;
      const id = btn.dataset.id;
      const loan = State.loans.find(l => l.id === id);
      try {
        await API.updateLoan(id, { paidAmount: loan.totalAmount, status: 'paid' });
        toast('Préstamo marcado como pagado', 'success');
        State.loans = await API.getLoans();
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'toggle-loan-history') {
      const id = btn.dataset.id;
      State.expandedLoanId = State.expandedLoanId === id ? null : id;
      render();
    }
    else if (action === 'del-loan-payment') {
      if (!confirm('¿Eliminar este pago del historial? Se restará del total pagado.')) return;
      const loanId = btn.dataset.loan;
      const payId = btn.dataset.pay;
      const amount = parseFloat(btn.dataset.amount) || 0;
      const loan = State.loans.find(l => l.id === loanId);
      try {
        await deleteDoc(doc(db, 'loans', loanId, 'payments', payId));
        await API.updateLoan(loanId, {
          paidAmount: Math.max(0, (loan.paidAmount || 0) - amount),
          status: 'active'
        });
        toast('Pago eliminado', 'info');
        State.loans = await API.getLoans();
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'delete-loan') {
      if (!confirm('¿Eliminar este préstamo?')) return;
      try {
        await API.deleteLoan(btn.dataset.id);
        State.loans = await API.getLoans();
        toast('Préstamo eliminado', 'info');
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'goto-loans') {
      State.adminTab = 'loans';
      render();
    }
    // ----- VACACIONES -----
    else if (action === 'add-vacation') {
      showVacationModal();
    }
    else if (action === 'save-vacation') {
      await saveVacation();
    }
    else if (action === 'delete-vacation') {
      if (!confirm('¿Eliminar este registro de vacaciones?')) return;
      try {
        await API.deleteVacation(btn.dataset.id);
        State.vacations = await API.getVacations();
        toast('Eliminado', 'info');
        render();
      } catch (e) { toast('Error: ' + e.message, 'error'); }
    }
    else if (action === 'view-vacations') {
      const empId = btn.dataset.emp;
      const emp = State.employees.find(e => e.id === empId);
      const vacs = State.vacations.filter(v => v.empId === empId).sort((a,b) => b.startDate.localeCompare(a.startDate));
      const html = vacs.length === 0
        ? '<p style="color:var(--text-dim);">Sin vacaciones registradas.</p>'
        : vacs.map(v => `<div style="padding:10px; background:var(--bg); border-radius:6px; margin-bottom:6px;"><strong>${v.days} días</strong> · ${fmtDateShort(v.startDate)} → ${fmtDateShort(v.endDate)}${v.note ? '<br><span style="font-size:12px; color:var(--text-muted);">'+v.note+'</span>' : ''}</div>`).join('');
      document.getElementById('modal-root').innerHTML = `
        <div class="modal-backdrop" id="modal-bd">
          <div class="modal">
            <h2>Vacaciones de ${emp.name}</h2>
            <p class="modal-sub">Historial completo</p>
            ${html}
            <div class="modal-actions"><button class="btn" data-action="close-modal">Cerrar</button></div>
          </div>
        </div>`;
      document.getElementById('modal-bd').addEventListener('click', (e) => {
        if (e.target.id === 'modal-bd') closeModal();
      });
    }
    // ----- RECIBO INDIVIDUAL -----
    else if (action === 'print-receipt') {
      printIndividualReceipt(btn.dataset.emp, btn.dataset.week);
    }
}

/* ============================================================
   RELOJ
   ============================================================ */
function startClock() {
  const tick = () => {
    const el = document.getElementById('live-clock');
    if (el) {
      const d = new Date();
      el.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }
  };
  tick();
  if (State.clockInterval) clearInterval(State.clockInterval);
  State.clockInterval = setInterval(tick, 1000);
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const loaderText = document.getElementById('loader-text');
  loaderText.textContent = 'Conectando con Firebase…';

  try {
    State.config = await API.getConfig();
  } catch (e) {
    document.getElementById('loader').innerHTML = `
      <div class="config-error">
        <h2>⚠ Error de conexión</h2>
        <p style="color: var(--text-dim);">No se pudo conectar con Firebase. Posibles causas:</p>
        <ul style="color: var(--text-dim); padding-left: 20px; margin-top: 12px; line-height: 1.8;">
          <li>Las reglas de seguridad de Firestore están mal configuradas</li>
          <li>El proyecto Firebase no está activo</li>
          <li>Los valores de configuración son incorrectos</li>
        </ul>
        <pre style="margin-top:16px;">${e.message}</pre>
      </div>`;
    return;
  }

  loaderText.textContent = 'Cargando reconocimiento facial…';
  try {
    await loadFaceModels();
  } catch (e) {
    document.getElementById('loader').innerHTML = `
      <div class="config-error">
        <h2>⚠ Error</h2>
        <p style="color: var(--text-dim);">No se pudieron cargar los modelos de reconocimiento facial. Verifica tu conexión.</p>
      </div>`;
    return;
  }

  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  await render();
  startClock();
}

init();
</script>
</body>
</html>
